<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キンツヨ速報</title>
<link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Noto+Sans+JP:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--bg2:#0e0e1c;--bg3:#141428;--border:#252540;--accent:#00ffcc;--accent2:#ff2d78;--text:#e0e8ff;--text-dim:#5a6080;--glow:rgba(0,255,204,.22);--card-glow:rgba(0,255,204,.09);--header-overlay:rgba(8,8,16,.92);}
body.theme-horror{--bg:#0a0000;--bg2:#160000;--bg3:#220000;--border:#440000;--accent:#cc0033;--accent2:#ff6600;--text:#ffdddd;--text-dim:#884444;--glow:rgba(200,0,50,.25);--card-glow:rgba(200,0,50,.1);}
body.theme-summer{--bg:#020d1a;--bg2:#041525;--bg3:#061e30;--border:#0a3050;--accent:#00c8ff;--accent2:#ff9500;--text:#d8f4ff;--text-dim:#3a7090;--glow:rgba(0,200,255,.2);--card-glow:rgba(0,200,255,.08);}
body.theme-xmas{--bg:#020c08;--bg2:#04120c;--bg3:#071a10;--border:#0f3a1a;--accent:#00e85a;--accent2:#ff3333;--text:#dfffec;--text-dim:#2a6a40;--glow:rgba(0,232,90,.2);--card-glow:rgba(0,232,90,.08);}
body.theme-halloween{--bg:#060400;--bg2:#0d0800;--bg3:#140d00;--border:#3a2000;--accent:#ff8c00;--accent2:#9b00ff;--text:#ffe8cc;--text-dim:#7a5020;--glow:rgba(255,140,0,.25);--card-glow:rgba(255,140,0,.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh;background-image:radial-gradient(circle,var(--border) 1px,transparent 1px);background-size:18px 18px;background-attachment:fixed;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at 50% 40%,transparent 35%,rgba(0,0,0,.65) 100%);}
header{position:relative;z-index:10;padding:16px 40px;border-bottom:3px solid var(--accent);background:var(--header-overlay);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;}
.logo-area{display:flex;align-items:center;gap:14px;justify-content:center;grid-column:2;}
.char-icon{width:52px;height:52px;border-radius:8px;border:2px solid var(--accent);box-shadow:0 0 16px var(--glow);overflow:hidden;position:relative;background:var(--bg3);flex-shrink:0;}
.char-face{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.face-bg{width:38px;height:44px;background:linear-gradient(180deg,#f5c9a0,#e8a880);border-radius:50% 50% 45% 45%;position:absolute;top:4px;}
.hair{width:42px;height:28px;background:#1a1a2e;border-radius:50% 50% 0 0;position:absolute;top:2px;z-index:2;}
.hair::before{content:'';position:absolute;width:8px;height:32px;background:#1a1a2e;left:-4px;top:8px;border-radius:4px;}
.hair::after{content:'';position:absolute;width:8px;height:32px;background:#1a1a2e;right:-4px;top:8px;border-radius:4px;}
.glasses{width:36px;height:10px;position:absolute;top:18px;z-index:3;display:flex;gap:2px;align-items:center;}
.glass-lens{width:14px;height:10px;border:1.5px solid #555;border-radius:3px;background:rgba(120,180,255,.15);}
.glass-bridge{width:4px;height:1.5px;background:#555;}
.mouth{width:16px;height:12px;background:#8b0000;border-radius:0 0 8px 8px;position:absolute;top:30px;z-index:3;border:1px solid #600;}
.mouth::before{content:'';position:absolute;width:4px;height:6px;background:#fff;left:50%;transform:translateX(-50%);top:1px;border-radius:1px;}
.blood{width:8px;height:10px;background:var(--accent2);position:absolute;top:34px;left:14px;z-index:3;border-radius:0 0 4px 4px;clip-path:polygon(0 0,100% 0,80% 100%,20% 100%);}
.logo-text{line-height:1;}
.logo-main{font-family:'Yomogi',cursive;font-size:3.2rem;font-weight:400;color:var(--accent);text-shadow:0 0 24px var(--glow);letter-spacing:.06em;line-height:1;}
.logo-sub{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--text-dim);letter-spacing:.16em;margin-top:4px;display:block;opacity:.6;}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;grid-column:3;}
.header-meta{font-size:.7rem;color:var(--text-dim);text-align:right;}
.header-meta strong{color:var(--accent);display:block;font-size:.85rem;}
.theme-badge{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--accent);padding:3px 10px;border:1px solid var(--accent);border-radius:4px;background:rgba(0,255,204,.06);}
.cat-tabs{position:relative;z-index:10;display:flex;border-bottom:3px solid var(--border);background:var(--bg2);overflow-x:auto;}
.cat-tab{padding:12px 24px;border:none;border-right:2px solid var(--border);background:transparent;color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.06em;}
.cat-tab:hover{color:var(--accent);background:var(--bg3);}
.cat-tab.active{color:var(--bg);background:var(--accent);}
.cat-count{font-size:.62rem;margin-left:5px;opacity:.75;}
.filter-bar{position:relative;z-index:10;display:flex;gap:7px;padding:12px 40px;border-bottom:1px solid var(--border);flex-wrap:wrap;background:var(--bg);}
.filter-btn{background:var(--bg3);border:2px solid var(--border);color:var(--text-dim);padding:4px 13px;border-radius:0;font-size:.7rem;cursor:pointer;font-family:'Share Tech Mono',monospace;letter-spacing:.04em;transition:all .15s;}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--bg);background:var(--accent);}
main{position:relative;z-index:10;max-width:1280px;margin:0 auto;padding:28px 40px;}
.section-label{font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.2em;color:var(--text-dim);margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.theme-banner{border:1px solid var(--accent);padding:11px 16px;margin-bottom:20px;background:rgba(0,255,204,.05);font-size:.76rem;color:var(--text-dim);display:flex;align-items:center;gap:12px;}
.theme-banner-icon{font-size:1.3rem;}
.theme-banner-text strong{color:var(--accent);display:block;font-size:.8rem;margin-bottom:2px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:15px;margin-bottom:32px;}
.card{background:var(--bg2);border:2px solid var(--border);border-radius:0;overflow:hidden;cursor:pointer;transition:transform .15s,border-color .15s,box-shadow .15s;position:relative;}
.card:hover{transform:translate(-2px,-4px);border-color:var(--accent);box-shadow:4px 4px 0 var(--accent);}
.card-image{width:100%;height:160px;object-fit:cover;display:block;background:var(--bg3);}
.card-no-image{width:100%;height:160px;background:linear-gradient(135deg,var(--bg3),#1a1a2e);display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:.7rem;color:var(--text-dim);}
.card-body{padding:13px 15px 15px;}
.card-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;}
.tag{font-size:.6rem;padding:2px 7px;border-radius:0;letter-spacing:.06em;font-weight:700;font-family:'Share Tech Mono',monospace;}
.tag-soul{background:rgba(255,56,96,.12);color:#ff6080;border:1px solid rgba(255,56,96,.28);}
.tag-hack{background:rgba(255,107,43,.12);color:#ff8050;border:1px solid rgba(255,107,43,.28);}
.tag-genre{background:rgba(0,255,204,.1);color:var(--accent);border:1px solid rgba(0,255,204,.25);}
.tag-plat{background:rgba(0,255,204,.08);color:var(--accent);border:1px solid rgba(0,255,204,.2);}
.tag-hot{background:rgba(255,100,100,.1);color:#ff6464;border:1px solid rgba(255,100,100,.25);}
.match-badge{display:inline-flex;align-items:center;gap:5px;font-size:.62rem;font-family:'Share Tech Mono',monospace;font-weight:700;letter-spacing:.06em;padding:3px 9px;border-radius:0;margin-bottom:8px;}
.match-s{background:var(--accent2);color:#fff;}
.match-a{background:transparent;color:var(--accent);border:2px solid var(--accent);}
.match-b{background:transparent;color:#00ff44;border:2px solid #00ff44;}
.match-c{background:transparent;color:var(--text-dim);border:2px solid var(--border);}
.card-info-row{display:flex;gap:14px;flex-wrap:wrap;margin:7px 0;padding:7px 0;border-top:2px solid var(--border);border-bottom:2px solid var(--border);}
.card-info-item{display:flex;flex-direction:column;gap:2px;}
.card-info-key{font-family:'Share Tech Mono',monospace;font-size:.5rem;letter-spacing:.08em;color:var(--text-dim);text-transform:uppercase;}
.card-info-val{font-family:'Share Tech Mono',monospace;font-size:.72rem;font-weight:700;color:var(--text);}
.card-title{font-size:.9rem;font-weight:700;line-height:1.42;margin-bottom:6px;}
.card-catch{font-size:.74rem;color:var(--text-dim);line-height:1.62;margin-bottom:10px;}
.card-footer{display:flex;align-items:center;justify-content:space-between;}
.score{display:flex;gap:2px;}
.star{font-size:.8rem;color:var(--border);}
.star.on{color:#ffd700;}
.star.accent{color:var(--accent2);}
.score-label{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--text-dim);margin-left:5px;}
.card-detail-btn{font-size:.65rem;color:var(--accent);letter-spacing:.06em;font-family:'Share Tech Mono',monospace;opacity:.65;transition:opacity .2s;}
.card:hover .card-detail-btn{opacity:1;}
.hot-flag{position:absolute;top:0;right:0;background:var(--accent2);color:#fff;font-size:.6rem;font-family:'Share Tech Mono',monospace;font-weight:700;padding:3px 8px;}
.pagination{display:flex;justify-content:center;gap:7px;margin-top:4px;}
.page-btn{width:35px;height:35px;border-radius:0;border:2px solid var(--border);background:var(--bg2);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.82rem;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.page-btn:hover,.page-btn.active{border-color:var(--accent);color:var(--bg);background:var(--accent);}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:3px solid var(--accent);border-radius:0;max-width:740px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:6px 6px 0 var(--accent);animation:modalIn .15s ease;}
@keyframes modalIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-image{width:100%;height:230px;object-fit:cover;}
.modal-body{padding:24px 26px;}
.modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.modal-title{font-size:1.2rem;font-weight:900;line-height:1.4;margin-bottom:12px;}
.match-block{padding:14px 16px;margin-bottom:16px;border-left:4px solid var(--accent);background:rgba(0,0,0,.3);}
.match-block-label{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.14em;color:var(--accent);margin-bottom:7px;font-weight:700;}
.match-block-text{font-size:.82rem;line-height:1.8;color:var(--text);}
.modal-section-title{font-family:'Share Tech Mono',monospace;font-size:.62rem;letter-spacing:.18em;color:var(--text-dim);margin:18px 0 9px;padding-bottom:6px;border-bottom:2px solid var(--border);}
.modal-desc{font-size:.82rem;line-height:1.85;color:var(--text);margin-bottom:8px;}
.modal-highlight{background:rgba(0,0,0,.4);border:2px solid var(--accent);padding:12px 15px;margin:12px 0;font-size:.8rem;line-height:1.75;color:var(--text);font-style:italic;}
.modal-meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:14px 0;}
.meta-item{background:var(--bg3);border:2px solid var(--border);padding:10px 13px;}
.meta-key{font-size:.6rem;letter-spacing:.12em;color:var(--text-dim);font-family:'Share Tech Mono',monospace;margin-bottom:4px;}
.meta-val{font-size:.82rem;font-weight:700;color:var(--text);}
.source-box{background:var(--bg3);border:2px solid var(--border);padding:10px 14px;margin:12px 0;font-size:.75rem;color:var(--text-dim);line-height:1.7;}
.source-box strong{color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:.65rem;letter-spacing:.1em;display:block;margin-bottom:4px;}
.modal-actions{display:flex;gap:8px;margin-top:18px;}
.btn-primary{flex:1;padding:10px;background:var(--accent);border:2px solid var(--accent);color:var(--bg);font-family:'Share Tech Mono',monospace;font-size:.8rem;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;display:block;}
.btn-primary:hover{background:transparent;color:var(--accent);}
.btn-close{padding:10px 16px;background:transparent;border:2px solid var(--border);color:var(--text-dim);font-family:'Share Tech Mono',monospace;font-size:.8rem;font-weight:700;cursor:pointer;}
.btn-close:hover{border-color:#ff2020;color:#ff2020;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
@media(max-width:640px){header,.filter-bar,main{padding-left:14px;padding-right:14px;}.grid{grid-template-columns:1fr;}.modal-meta{grid-template-columns:1fr;}.logo-main{font-size:2.2rem;}}
</style>
</head>
<body>
<header>
  <div style="grid-column:1"></div>
  <div class="logo-area">
    <div class="char-icon"><div class="char-face"><div class="face-bg"></div><div class="hair"></div><div class="glasses"><div class="glass-lens"></div><div class="glass-bridge"></div><div class="glass-lens"></div></div><div class="mouth"></div><div class="blood"></div></div></div>
    <div class="logo-text"><div class="logo-main">キンツヨ速報</div><div class="logo-sub">DAILY GAME &amp; TECH DIGEST</div></div>
  </div>
  <div class="header-right">
    <div class="theme-badge" id="theme-badge">🎮 DAILY</div>
    <div class="header-meta"><strong id="today-date">2026年4月18日(土)</strong>04:20 配信</div>
  </div>
</header>
<div class="cat-tabs" id="cat-tabs"></div>
<div class="filter-bar" id="filter-bar"></div>
<main>
  <div class="section-label">TODAY'S PICKS — <span id="article-count"></span> ARTICLES</div>
  <div class="theme-banner" id="theme-banner"><div class="theme-banner-icon" id="theme-icon">🎮</div><div class="theme-banner-text"><strong id="theme-name">DAILY EDITION</strong><span id="theme-desc">キンツヨ速報、本日も全力でお届けする。</span></div></div>
  <div class="grid" id="grid"></div>
  <div class="pagination" id="pagination"></div>
</main>
<div class="modal-overlay" id="modal" onclick="closeModal(event)"><div class="modal" id="modal-content"></div></div>
<script>
const ARTICLES=[{"title":"SCUM","genre":"Survival","platform":"Steam","mode":"Multiplayer","matchRank":"C","matchText":"オープンワールドサバイバルゲームですが、Soulslikeやハックアンドスラッシュではありません。Steamで配信されていますが、優先度は低いです。","catch":"過酷な環境で生き残れ","desc":"SCUMはSteamで正式リリースされたサバイバルゲームです。プレイヤーは囚人として島に送られ、生き残りを賭けて戦います。リアルな身体管理システムが特徴的な作品となっています。","highlight":"リアルな生存システム","hot":false,"score":3,"url":"https://store.steampowered.com/news/246601/","source":"Steam"},{"title":"Foundation","genre":"Strategy/City Builder","platform":"Steam","mode":"Single Player","matchRank":"C","matchText":"中世都市建設ストラテジーゲームで、優先ジャンルには該当しません。25%オフのセール中ですが、マッチ度は低いです。","catch":"中世の都市を築け","desc":"Foundationは中世ヨーロッパを舞台にした都市建設ゲームです。25%オフでSteamにて配信中となっています。自由な建設システムと有機的な都市成長が楽しめます。","highlight":"自由な都市設計","hot":false,"score":2,"url":"https://store.steampowered.com/news/237790/","source":"Steam"},{"title":"The Universim","genre":"God Game/Strategy","platform":"Steam","mode":"Single Player","matchRank":"C","matchText":"神となって文明を導く戦略ゲームです。優先ジャンルではありませんが、Steamでの配信です。","catch":"文明を導く神となれ","desc":"The UniversimはSteamで正式リリースされた神ゲームシミュレーションです。プレイヤーは神として文明の発展を見守り導きます。石器時代から宇宙時代まで文明を成長させることができます。","highlight":"文明育成シミュレーション","hot":false,"score":2,"url":"https://store.steampowered.com/news/215594/","source":"Steam"},{"title":"Cowbots and Aliens","genre":"Action","platform":"Steam","mode":"Single Player","matchRank":"C","matchText":"西部劇風のアクションゲームですが、優先ジャンルではありません。Steamで配信されています。","catch":"西部のロボット保安官","desc":"Cowbots and AliensはSteamで配信開始されたアクションゲームです。ロボット保安官となってエイリアンと戦います。西部劇とSFが融合したユニークな世界観が特徴です。","highlight":"西部劇×SF","hot":false,"score":2,"url":"https://store.steampowered.com/news/214495/","source":"Steam"},{"title":"Kodon","genre":"Creative Tool","platform":"Steam","mode":"Single Player","matchRank":"C","matchText":"VR 3Dモデリングツールで、ゲームではありません。優先度は最も低いです。","catch":"VRで3Dモデリング","desc":"KodonはSteamで配信されたVR 3Dモデリングツールです。仮想空間内で直感的に3Dモデルを作成できます。ゲーム開発やアート制作に活用できるクリエイティブツールです。","highlight":"直感的VRモデリング","hot":false,"score":1,"url":"https://store.steampowered.com/news/213793/","source":"Steam"},{"title":"RAILGRADE","genre":"Puzzle/Strategy","platform":"Steam","mode":"Single Player","matchRank":"C","matchText":"鉄道パズルストラテジーで、優先ジャンルではありません。25%オフで配信中です。","catch":"鉄道網を最適化せよ","desc":"RAILGRADEは25%オフでSteamにて配信中の鉄道パズルゲームです。効率的な鉄道網を構築して資源を輸送します。パズル要素と戦略性が融合した作品となっています。","highlight":"鉄道パズル戦略","hot":false,"score":2,"url":"https://store.steampowered.com/news/210653/","source":"Steam"},{"title":"Kynseed","genre":"RPG/Life Sim","platform":"Steam","mode":"Single Player","matchRank":"C","matchText":"生活シミュレーションRPGですが、Soulslikeではありません。10%オフでSteam配信中です。","catch":"世代を超えるファンタジー生活","desc":"Kynseedは10%オフでSteamにて配信されているライフシミュレーションRPGです。ファンタジー世界で生活し、世代を超えて家族の物語を紡ぎます。農業、戦闘、商売など多彩な要素が楽しめます。","highlight":"世代継承システム","hot":false,"score":3,"url":"https://store.steampowered.com/news/166893/","source":"Steam"},{"title":"Quake Champions","genre":"FPS","platform":"Steam","mode":"Multiplayer","matchRank":"C","matchText":"クラシックFPSですが、優先ジャンルではありません。Steamで基本無料配信中です。","catch":"伝説のアリーナFPS","desc":"Quake ChampionsはSteamで配信された基本無料のアリーナFPSです。高速なゲームプレイと競技性が特徴の作品です。様々なチャンピオンを使い分けて戦います。","highlight":"高速アリーナバトル","hot":false,"score":3,"url":"https://store.steampowered.com/news/142057/","source":"Steam"},{"title":"Airborne Empire","genre":"RPG/City Builder","platform":"Steam","mode":"Single Player","matchRank":"B","matchText":"空中都市運営とオープンワールド探索を組み合わせたRPGです。Steamで正式版がリリースされ、ユニークなゲーム性を持っています。","catch":"空に浮かぶ都市を運営","desc":"Airborne Empireは空中都市を運営しながらオープンワールドを冒険できるRPGです。正式版がSteamでリリースされました。都市建設と探索が融合したユニークなゲームプレイが楽しめます。","highlight":"空中都市×冒険RPG","hot":true,"score":4,"url":"https://www.4gamer.net/games/720/G072038/20260417021/","source":"4Gamer"},{"title":"餓狼伝説 City of the Wolves","genre":"Fighting","platform":"Multi Platform","mode":"Multiplayer","matchRank":"C","matchText":"対戦格闘ゲームで、ヴォルフガング・クラウザーがDLCとして追加されます。優先ジャンルではありません。","catch":"伝説の闇の帝王が復活","desc":"餓狼伝説 City of the Wolvesに4月24日、DLCキャラクター「ヴォルフガング・クラウザー」が追加されます。同時に大型アップデートも実施予定です。伝説のボスキャラクターがプレイアブルとして参戦します。","highlight":"クラウザー参戦","hot":true,"score":3,"url":"https://www.4gamer.net/games/649/G064915/20260417070/","source":"4Gamer"},{"title":"鬼サザエトリ","genre":"Action","platform":"Steam","mode":"Single Player","matchRank":"B","matchText":"小さなゴブリンが体を回転させて海で獲物を獲る2Dアクションです。Steamで配信され、ユニークなゲーム性を持っています。","catch":"ゴブリンの素潜り貝採り","desc":"鬼サザエトリは川尻こだま氏が手掛ける2Dアクションゲームです。小さなゴブリンが体をブン回しながら海で獲物を獲ります。Steamで配信された独特なゲームプレイが特徴の作品です。","highlight":"回転アクション","hot":true,"score":3,"url":"https://www.4gamer.net/games/000/G100026/20260417069/","source":"4Gamer"},{"title":"FINAL FANTASY XIV パッチ7.5","genre":"MMORPG","platform":"Multi Platform","mode":"Multiplayer","matchRank":"C","matchText":"MMORPGの大型アップデートですが、優先ジャンルではありません。新ストーリーとコンテンツが追加されます。","catch":"彼方に至る路","desc":"FINAL FANTASY XIVのパッチ7.5「彼方に至る路」の最新トレイラーが公開されました。新たなストーリーやコンテンツの一端が垣間見える映像となっています。大型アップデートで新要素が多数追加される予定です。","highlight":"新ストーリー展開","hot":true,"score":4,"url":"https://www.4gamer.net/games/199/G019924/20260417068/","source":"4Gamer"},{"title":"バブルボブル シュガーダンジョン ブースト","genre":"Action/Roguelike","platform":"PS5/Switch","mode":"Single Player","matchRank":"B","matchText":"ダンジョン探索型のアクションゲームで、Switchで8月20日発売です。繰り返し挑戦してキャラクターを強化していきます。","catch":"バブルンと挑むダンジョン","desc":"バブルボブル シュガーダンジョン ブーストがPS5/Switch向けに8月20日発売されます。ダンジョンに繰り返し挑戦しバブルンを強化しながら奥深くを目指します。ローグライク要素を取り入れた新しいバブルボブルです。","highlight":"ローグライク要素","hot":true,"score":4,"url":"https://www.4gamer.net/games/924/G092462/20260417065/","source":"4Gamer"},{"title":"Cthulhu: The Cosmic Abyss","genre":"Horror/Adventure","platform":"Steam","mode":"Single Player","matchRank":"C","matchText":"海底施設を探索するホラーアドベンチャーゲームです。Steamで配信されていますが、優先ジャンルではありません。","catch":"狂気の海底施設","desc":"Cthulhu: The Cosmic Abyssは本日リリースされたホラーアドベンチャーです。狂気が忍び寄る海底施設を探索します。クトゥルフ神話をベースにした恐怖体験が楽しめる作品です。","highlight":"クトゥルフホラー","hot":true,"score":3,"url":"https://www.4gamer.net/games/889/G088951/20260417067/","source":"4Gamer"},{"title":"GAME MUSIC JAM - Level 1","genre":"Event","platform":"Event","mode":"Event","matchRank":"C","matchText":"ゲーム音楽ライブ const THEMES={halloween:{cls:'theme-halloween',icon:'🎃',name:'HALLOWEEN SPECIAL',desc:'闇夜に潜むゲームの恐怖。'},xmas:{cls:'theme-xmas',icon:'🎄',name:'CHRISTMAS EDITION',desc:'聖なる夜の特別速報。'},summer:{cls:'theme-summer',icon:'🌊',name:'SUMMER WAVE',desc:'灼熱の夏の速報。'},horror:{cls:'theme-horror',icon:'🩸',name:'HORROR NIGHT',desc:'ホラーな夜の速報。'},launch:{cls:'theme-launch',icon:'🚀',name:'LAUNCH WEEK',desc:'大型リリース週の速報。'},default:{cls:'',icon:'🎮',name:'DAILY EDITION',desc:'キンツヨ速報、本日も全力でお届けする。'}};
function detectTheme(){const n=new Date(),m=n.getMonth()+1,d=n.getDate(),dow=n.getDay();if(m===10&&d>=20)return'halloween';if(m===12&&d>=20&&d<=26)return'xmas';if(m>=7&&m<=8)return'summer';if(dow===1)return'launch';if(dow===5&&n.getHours()>=22||dow===6&&n.getHours()<=4)return'horror';return'default';}
const activeTheme=detectTheme();
function applyTheme(k){const t=THEMES[k];Object.values(THEMES).forEach(({cls})=>{if(cls)document.body.classList.remove(cls);});if(t.cls)document.body.classList.add(t.cls);document.getElementById('theme-icon').textContent=t.icon;document.getElementById('theme-name').textContent=t.name;document.getElementById('theme-desc').textContent=t.desc;document.getElementById('theme-badge').textContent=t.icon+' '+t.name;}
applyTheme(activeTheme);
const CATS=[{key:'all',label:'🎮 全記事',filters:['all','ソウルライク','ハクスラ','Switch2','Steam','★S']},{key:'game',label:'🕹 ゲーム全般',filters:['all','ソウルライク','ハクスラ','★S']},{key:'steam',label:'🖥 Steam',filters:['all','★S']},{key:'nintendo',label:'🎮 Nintendo',filters:['all','★S']}];
function categorize(a){const g=(a.genre||'').toLowerCase();const p=(a.platform||'').toLowerCase();if(p.includes('switch2')||p.includes('nintendo'))return'nintendo';if(p.includes('steam'))return'steam';return'game';}
let currentCat='all',currentFilter='all',currentPage=1;const PER_PAGE=30;
function setCat(key){currentCat=key;currentFilter='all';currentPage=1;renderCatTabs();renderFilterBar();renderGrid();}
function renderCatTabs(){document.getElementById('cat-tabs').innerHTML=CATS.map(c=>{const count=c.key==='all'?ARTICLES.length:ARTICLES.filter(a=>categorize(a)===c.key).length;return`<button class="cat-tab ${c.key===currentCat?'active':''}" onclick="setCat('${c.key}')">${c.label}<span class="cat-count">${count}</span></button>`;}).join('');}
function renderFilterBar(){const cat=CATS.find(c=>c.key===currentCat);document.getElementById('filter-bar').innerHTML=cat.filters.map(f=>`<button class="filter-btn ${f===currentFilter?'active':''}" onclick="applyFilter('${f}',this)">${f==='all'?'ALL':f==='★S'?'★ Sランクのみ':f}</button>`).join('');}
function getFiltered(){let list=currentCat==='all'?ARTICLES:ARTICLES.filter(a=>categorize(a)===currentCat);if(currentFilter==='★S')list=list.filter(a=>a.matchRank==='S');else if(currentFilter!=='all')list=list.filter(a=>(a.genre||'').toLowerCase().includes(currentFilter.toLowerCase())||(a.platform||'').toLowerCase().includes(currentFilter.toLowerCase()));return list;}
function applyFilter(key,btn){document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentFilter=key;currentPage=1;renderGrid();}
function stars(n,accent){return[...Array(5)].map((_,i)=>`<span class="star ${i<n?(accent?'accent':'on'):''}">★</span>`).join('');}
function matchBadge(rank){const cfg={S:{cls:'match-s',lbl:'S MATCH'},A:{cls:'match-a',lbl:'A MATCH'},B:{cls:'match-b',lbl:'B MATCH'},C:{cls:'match-c',lbl:'C MATCH'}};const c=cfg[rank]||cfg.C;return`<div class="match-badge ${c.cls}">${c.lbl} — ${{S:'強くおすすめ',A:'かなりおすすめ',B:'参考程度に',C:'情報として'}[rank]}</div>`;}
function tagCls(a){const g=(a.genre||'').toLowerCase();if(g.includes('soul')||g.includes('ソウルライク'))return'tag-soul';if(g.includes('hack')||g.includes('ハクスラ'))return'tag-hack';return'tag-genre';}
function buildCard(a,idx){const isSoul=tagCls(a)!=='tag-genre';const img=a.image?`<img class="card-image" src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`:'';return`<div class="card" onclick="openModal(${idx})">${a.hot?'<div class="hot-flag">HOT</div>':''}${img}<div class="card-no-image" ${a.image?'style="display:none"':''}>NO IMAGE</div><div class="card-body"><div class="card-tags"><span class="tag ${tagCls(a)}">${a.genre||''}</span>${a.platform?`<span class="tag tag-plat">${a.platform}</span>`:''}${a.hot?'<span class="tag tag-hot">🔥 HOT</span>':''}</div>${matchBadge(a.matchRank)}<div class="card-title">${a.title}</div><div class="card-info-row"><div class="card-info-item"><span class="card-info-key">スコア</span><span class="card-info-val">${stars(a.score,isSoul)}</span></div>${a.platform?`<div class="card-info-item"><span class="card-info-key">Platform</span><span class="card-info-val">${a.platform}</span></div>`:''}${a.mode?`<div class="card-info-item"><span class="card-info-key">Mode</span><span class="card-info-val">${a.mode}</span></div>`:''}</div><div class="card-catch">${a.catch||''}</div><div class="card-footer"><div style="display:flex;align-items:center"><div class="score">${stars(a.score,isSoul)}</div><span class="score-label">${a.score}/5</span></div><span class="card-detail-btn">詳細を見る →</span></div></div></div>`;}
function renderGrid(){const filtered=getFiltered();const slice=filtered.slice((currentPage-1)*PER_PAGE,currentPage*PER_PAGE);document.getElementById('grid').innerHTML=slice.map((a,i)=>buildCard(a,ARTICLES.indexOf(a))).join('');document.getElementById('article-count').textContent=filtered.length;renderPagination(filtered.length);}
function renderPagination(total){const pages=Math.ceil(total/PER_PAGE);document.getElementById('pagination').innerHTML=pages<=1?'':[...Array(pages)].map((_,i)=>`<button class="page-btn ${i+1===currentPage?'active':''}" onclick="goPage(${i+1})">${i+1}</button>`).join('');}
function goPage(n){currentPage=n;renderGrid();window.scrollTo({top:0,behavior:'smooth'});}
function openModal(idx){const a=ARTICLES[idx];const isSoul=tagCls(a)!=='tag-genre';const img=a.image?`<img class="modal-image" src="${a.image}" alt="${a.title}" onerror="this.style.display='none'">`:'';document.getElementById('modal-content').innerHTML=`${img}<div class="modal-body"><div class="modal-tags"><span class="tag ${tagCls(a)}">${a.genre||''}</span>${a.platform?`<span class="tag tag-plat">${a.platform}</span>`:''}${a.hot?'<span class="tag tag-hot">🔥 HOT</span>':''}</div><div class="modal-title">${a.title}</div><div class="modal-section-title">YOUR MATCH ANALYSIS</div><div class="match-block"><div class="match-block-label">RANK ${a.matchRank} — ${{S:'あなたに強くおすすめ',A:'かなりおすすめ',B:'参考程度に',C:'情報として'}[a.matchRank]}</div><div class="match-block-text">${a.matchText||''}</div></div><div class="modal-section-title">DETAIL</div><div class="modal-desc">${a.desc||''}</div><div class="modal-highlight">${a.highlight||''}</div><div class="modal-meta"><div class="meta-item"><div class="meta-key">スコア</div><div class="meta-val">${stars(a.score,isSoul)} ${a.score}/5</div></div><div class="meta-item"><div class="meta-key">プラットフォーム</div><div class="meta-val">${a.platform||'—'}</div></div><div class="meta-item"><div class="meta-key">プレイスタイル</div><div class="meta-val">${a.mode||'—'}</div></div><div class="meta-item"><div class="meta-key">ジャンル</div><div class="meta-val">${a.genre||'—'}</div></div></div>${a.source?`<div class="source-box"><strong>参照元</strong>${a.source}</div>`:''}<div class="modal-actions"><a class="btn-primary" href="${a.url||'#'}" target="_blank">元記事を見る →</a><button class="btn-close" onclick="document.getElementById('modal').classList.remove('open')">閉じる</button></div></div>`;document.getElementById('modal').classList.add('open');}
function closeModal(e){if(e.target===document.getElementById('modal'))document.getElementById('modal').classList.remove('open');}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('modal').classList.remove('open');});
renderCatTabs();renderFilterBar();renderGrid();
</script>
</body>
